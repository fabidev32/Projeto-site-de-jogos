<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadasto de jogos</title>
    <link rel="stylesheet" href="./../css/cadastro.css" class="stylesheet" />
    <link rel="stylesheet" href="./../css/style.css" class="stylesheet" />
  </head>
  <body>
    <main>
      <section class="container_formulario">
        <div class="div_formulario">
          <!---É o filho de section. Preciso de um pai para ele pois é o section que define o espaço que posso utilizar -->
          <!-- Informações básicas -->
          <div class="div_texto">
            <h3>Cadastre um jogo que você gosta!</h3>
            <input type="text" id="nome" placeholder="Digite o nome do jogo" />
            <input
              type="text"
              id="descricao"
              placeholder="Digite a descrição do jogo"
            />
            <input type="text" id="link" placeholder="Digite o link do jogo" />
          </div>

          <!-- Adicionar imagem -->
          <div class="div_imagem">
            <div>
              <!-- Coloquei porque quero um do lado do outro -->
              <label for="input_com_imagem">Selecione uma imagem </label>
              <input type="file" id="input_com_imagem" />
              <button onclick="VeImagem()">Vê imagem</button>
            </div>
            <div class="visualizar_imagem_baixada"></div>
          </div>

          <!-- Botões de ação -->
          <div class="div_botoes">
            <button id="button" onclick="CriarJogo()">Criar jogo</button>
          </div>
        </div>
      </section>
      <!-- Lista de jogos-->
      <div class="lista_de_jogos"></div>
    </main>
    <script src="./../javascript/cadastro.js"></script>
  </body>
</html>
