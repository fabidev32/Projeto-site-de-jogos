<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadasto de jogos</title>
    <link rel="stylesheet" href="./../css/cadastro.css" class="stylesheet" />
    <link rel="stylesheet" href="./../css/style.css" class="stylesheet" />
  </head>
  <body>
    <main>
      <section class="container_formulario">
        <div class="div_formulario">
          <h3>Cadastre um jogo que você gosta!</h3>
          <input type="text" id="nome" placeholder="Digite o nome do jogo" />
          <input
            type="text"
            id="descricao"
            placeholder="Digite a descrição do jogo"
          />
          <button id = "button" onclick="CriarJogo()">Criar jogo</button>
          <button id = "button" onclick="Limparlista()">Remover</button>
        </div>
      </section>
      <!-- Lista de jogos-->
      <div class="lista_de_jogos"></div>
    </main>
    <script src="./../javascript/script.js"></script>
  </body>
</html>
